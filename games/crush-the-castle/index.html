<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crush the Castle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #DED7C8; font-family: 'Nunito', sans-serif; }
    input[type=range].ct {
      -webkit-appearance: none; appearance: none;
      height: 8px; border-radius: 999px;
      background: #E8DDC2; border: 2px solid #2E2117; outline: none;
    }
    input[type=range].ct::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: #E8533A; border: 2.5px solid #2E2117;
      cursor: pointer; box-shadow: 0 2px 0 #2E2117;
    }
    input[type=range].ct::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: #E8533A; border: 2.5px solid #2E2117; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
